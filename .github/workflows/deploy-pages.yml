name: Desplegar REA en GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configurar URL pública
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/$REPO_NAME"
          echo "NEXT_PUBLIC_REA_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_REA_PUBLIC_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io${BASE_PATH}/" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
